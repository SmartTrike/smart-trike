name: Smart Trike

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  laravel-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4  # Checkout the latest code from GitHub

    - name: Set up PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'  # Set the PHP version to match your Laravel app
        extensions: mbstring, bcmath, intl, xml, zip  # Required PHP extensions for Laravel

    - name: Install Composer
      run: curl -sS https://getcomposer.org/installer | php  # Download and install Composer

    - name: Install Dependencies
      run: |
        php composer.phar install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

    - name: Copy .env File
      run: php -r "file_exists('.env') || copy('.env.example', '.env');"  # Copy .env file if it doesn't exist

    - name: Generate Laravel App Key
      run: php artisan key:generate  # Generate Laravel app key

    - name: Set Directory Permissions
      run: |
        chmod -R 777 storage bootstrap/cache  # Set proper permissions for Laravel directories

    - name: Run Database Migrations (if applicable)
      run: php artisan migrate --force  # Run database migrations with --force to bypass confirmation prompt

    - name: Run Tests (Unit and Feature tests via PHPUnit/Pest)
      env:
        DB_CONNECTION: sqlite
        DB_DATABASE: database/database.sqlite  # If using SQLite for testing, set DB path
      run: php artisan test  # Run tests

    - name: Deploy to Production Server
      env:
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}  # Your private SSH key from GitHub Secrets
      run: |
        ssh -o StrictHostKeyChecking=no user@your-server-ip << 'EOF'
          cd /path/to/your/laravel/project  # Path to your Laravel project on the server
          git pull origin main  # Pull the latest changes from the GitHub repository
          composer install --no-interaction --prefer-dist  # Install the latest dependencies
          php artisan migrate --force  # Run migrations on the server
          php artisan config:cache  # Cache the config for better performance
          php artisan route:cache  # Cache the routes
          php artisan view:cache  # Cache the views
          sudo service php8.0-fpm restart  # Restart PHP (adjust PHP version if necessary)
          sudo service nginx restart  # Restart Nginx or Apache (adjust for your server)
        EOF
